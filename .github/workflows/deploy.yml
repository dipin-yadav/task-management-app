name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # These permissions are required for OIDC (JWT) token generation
    permissions:
      id-token: write
      contents: read
    
    env:
      SKIP_ENV_VALIDATION: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          # Use the AWS Role ARN stored as a GitHub Secret
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: GitHubActionsDeployment
          aws-region: ap-south-1

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy Database Migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
        run: npm run db:migrate

      - name: Sync SST Runtime Secrets
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.PRODUCTION_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.PRODUCTION_NEXTAUTH_URL }}
        run: |
          npx sst secret set DATABASE_URL "$DATABASE_URL" --stage production
          npx sst secret set NEXTAUTH_SECRET "$NEXTAUTH_SECRET" --stage production
          npx sst secret set NEXTAUTH_URL "$NEXTAUTH_URL" --stage production

      - name: Deploy via SST
        run: npx sst deploy --stage production
